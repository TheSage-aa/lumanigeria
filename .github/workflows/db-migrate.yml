name: Apply D1 migration

on:
  workflow_dispatch:
    inputs:
      migration_file:
        description: "Path to the SQL migration file (relative to repo root)"
        required: true
        default: "d1/migrations/0002_newsletter_subscribers.sql"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Apply migration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MIGRATION_FILE: ${{ inputs.migration_file }}
        run: npx wrangler d1 execute luma-submissions --remote --file="$MIGRATION_FILE"
