name: One-time D1 setup

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: "Password to set for the /admin panel"
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Create D1 database
        id: create_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 create luma-submissions --json | tee /tmp/d1-create.json

      - name: Apply schema to the new database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute luma-submissions --remote --file=d1/schema.sql

      - name: Set ADMIN_PASSWORD secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PASSWORD_INPUT: ${{ inputs.admin_password }}
        run: printf '%s' "$ADMIN_PASSWORD_INPUT" | npx wrangler secret put ADMIN_PASSWORD --name lumanigeria

      - name: Print database_id to wire into wrangler.jsonc
        run: node -e "console.log('DATABASE_ID:', require('/tmp/d1-create.json').result.uuid)"
