name: One-time D1 setup

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: "Password to set for the /admin panel"
        required: true

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Create D1 database (or reuse if it already exists)
        id: create_db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -uo pipefail
          npx wrangler d1 create luma-submissions > /tmp/d1-create.txt 2>&1
          CREATE_EXIT=$?
          cat /tmp/d1-create.txt
          if [ $CREATE_EXIT -ne 0 ] && grep -qi "already exists" /tmp/d1-create.txt; then
            echo "Database already exists, listing to find its id..."
            npx wrangler d1 list --json > /tmp/d1-list.json
            cat /tmp/d1-list.json
            DB_ID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/d1-list.json','utf8')).find(d => d.name === 'luma-submissions').uuid)")
          elif [ $CREATE_EXIT -ne 0 ]; then
            exit $CREATE_EXIT
          else
            DB_ID=$(grep -oE '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' /tmp/d1-create.txt | head -1)
          fi
          if [ -z "$DB_ID" ]; then
            echo "Could not determine database_id" >&2
            exit 1
          fi
          echo "database_id=$DB_ID" >> "$GITHUB_OUTPUT"
          echo "Resolved database_id: $DB_ID"

      - name: Write real database_id into wrangler.jsonc
        env:
          DATABASE_ID: ${{ steps.create_db.outputs.database_id }}
        run: |
          node -e "
            const fs = require('fs');
            const path = 'wrangler.jsonc';
            let content = fs.readFileSync(path, 'utf8');
            content = content.replace('REPLACE_WITH_D1_DATABASE_ID', process.env.DATABASE_ID);
            fs.writeFileSync(path, content);
          "
          cat wrangler.jsonc

      - name: Apply schema to the new database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute luma-submissions --remote --file=d1/schema.sql

      - name: Set ADMIN_PASSWORD secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ADMIN_PASSWORD_INPUT: ${{ inputs.admin_password }}
        run: printf '%s' "$ADMIN_PASSWORD_INPUT" | npx wrangler secret put ADMIN_PASSWORD --name lumanigeria

      - name: Commit the real database_id
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.jsonc
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Wire real D1 database_id into wrangler.jsonc"
            git push
          fi
